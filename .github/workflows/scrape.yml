name: Scrape Autosphere

on:
  schedule:
    # Tous les jours à 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install -r requirements-scraping.txt
          playwright install --with-deps chromium

      - name: Scraper par marque
        run: python scraper.py

      - name: Scraper par marque et modèle
        run: python scraper_modeles.py

      - name: Committer les nouvelles données
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Mise à jour des données (auto)"
          git push
